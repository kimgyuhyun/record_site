spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://localhost:3307/loldb?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useServerPrepStmts=false
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true


riot:
  api:
    key: ${RIOT_API_KEY}
    base-url: https://kr.api.riotgames.com
    asia-base-url: https://asia.api.riotgames.com

    account-by-riot-id-path: /riot/account/v1/accounts/by-riot-id/{gameName}/{tagLine}
    account-by-puuid-path: /riot/account/v1/accounts/by-puuid/{puuid}
    summoner-by-puuid-path: /lol/summoner/v4/summoners/by-puuid/{puuid}

    match-ids-by-puuid-path: /lol/match/v5/matches/by-puuid/{puuid}/ids
    match-by-id-path: /lol/match/v5/matches/{matchId}

    league-entries-by-puuid-path: /lol/league/v4/entries/by-puuid/{puuid}
    league-apex-by-queue-path: /lol/league/v4/{apexTier}/by-queue/{queue}

    champion-mastery-by-puuid-path: /lol/champion-mastery/v4/champion-masteries/by-puuid/{puuid}

    # 개발용 키 한도(20 req/s, 100 req/2분)보다 살짝 낮게 잡아 429 여유 확보. 모든 Riot 호출이 공유.
    rate-limit:
      requests-per-second: 18
      requests-per-two-minutes: 95

  # 매치망 점진 수집 크롤러(검색된 유저의 동료 puuid를 백그라운드로 따라가며 매치 누적)
  crawler:
    enabled: true
    interval-ms: 20000        # 스케줄러 처리 간격(이전 처리 종료 후 대기). 실제 속도는 레이트리밋이 결정
    max-depth: 1              # 검색 유저(0)로부터 몇 단계까지 확장할지. 1 = 직접 만난 동료까지만
    daily-limit: 300          # 하루 최대 처리 puuid 수(폭주 방지)
    matches-per-puuid: 10     # 크롤링 puuid 1명당 수집할 최근 매치 수

  # 상위 티어 사다리 랭킹 주기 갱신(실시간 아님 — 30~60분마다 스냅샷)
  ranking:
    enabled: true
    refresh-interval-ms: 3600000   # 갱신 주기(기본 1시간)
    initial-delay-ms: 60000        # 기동 후 첫 갱신까지 지연(다른 초기화와 겹치지 않게)
    top-n: 300                     # 사다리 상위 몇 명까지 적재할지(이름 해소 호출량을 이 수로 제한)
    most-champion-count: 7         # 행마다 보여줄 모스트 챔피언 수(우리 DB 기준)
