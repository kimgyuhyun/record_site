spring:
  application:
    name: backend
  # 직렬화 기준 타임존도 UTC 로 통일(Date/Instant 등). LocalDateTime 은 JacksonTimeConfig 가 'Z' 를 붙여 UTC 로 내려준다.
  jackson:
    time-zone: UTC
  datasource:
    # DB_HOST/DB_PORT 미지정 시 로컬 docker-compose mysql(호스트 포트 3307)로 접속.
    # 컨테이너 배포 시 DB_HOST=mysql, DB_PORT=3306 으로 주입한다.
    # ⚠️ serverTimezone 은 Asia/Seoul 로 유지할 것(UTC 로 바꾸지 말 것).
    # 이 앱은 예전부터 이 설정으로 동작해왔다: MySQL 드라이버가 저장 시 JVM(UTC)→세션(KST,+9)로 변환해
    # DATETIME 컬럼에 KST 벽시계로 물리 저장하고, 조회 시 KST→UTC(-9)로 되돌려 Java 에는 항상 올바른 UTC 를 준다.
    # UTC 로 바꾸면 이 왕복 보정이 깨져 기존 행이 9시간 미래로 노출된다(댓글 시간이 '방금 전'으로 뜨는 버그의 원인이었음).
    # 시각의 UTC 계약은 애플리케이션 경계에서 보장한다: JVM 기본 TZ=UTC(BackendApplication) + 응답 직렬화에 'Z'(JacksonTimeConfig).
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/loldb?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useServerPrepStmts=false
    # 런타임 계정은 DML(SELECT/INSERT/UPDATE/DELETE)만 가진 loldb_app 이다 — 스키마를 못 바꾼다.
    # dev 는 변수 미지정 시 예전처럼 root + DB_PASSWORD 로 폴백해 그대로 동작한다.
    username: ${DB_APP_USER:root}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 캐시. REDIS_HOST 미지정 시 localhost. 컨테이너 배포 시 REDIS_HOST=redis 로 주입한다.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # 운영 Redis 는 requirepass 를 건다. 캐시(CacheConfig)와 전적갱신 작업큐(BRPOP)가
      # 같은 자동설정 커넥션 팩토리를 공유하므로 이 한 줄이 두 경로 모두에 적용된다.
      # dev(무인증)는 빈 값이 기본 — 빈 password 는 AUTH 를 보내지 않는다.
      password: ${REDIS_PASSWORD:}
      # Redis 는 캐시 용도로만 쓴다(Repository 저장소 아님). JPA 리포지토리를 Redis 로 오인 스캔하지 않게 끔.
      repositories:
        enabled: false
  # Redis 가 없는 로컬 환경에서는 SPRING_CACHE_TYPE=none 으로 캐시를 끌 수 있다.
  cache:
    type: ${SPRING_CACHE_TYPE:redis}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    # Flyway 만 DDL 가능 계정으로 접속한다(datasource 는 DML 전용이라 마이그레이션을 실행할 수 없다).
    # url 을 따로 주지 않으면 Spring Boot 가 위 datasource 의 url 에 이 자격증명만 바꿔 별도 DataSource 를 만든다.
    # 이 계정에는 DDL 뿐 아니라 DML 도 필요하다 — flyway_schema_history 에 이력을 기록해야 하기 때문.
    user: ${DB_MIGRATE_USER:${DB_APP_USER:root}}
    password: ${DB_MIGRATE_PASSWORD:${DB_APP_PASSWORD:${DB_PASSWORD}}}
    # V1__init_schema 가 현재 전체 스키마를 만든다(엔티티 기준 Hibernate DDL 을 떠온 것). 따라서 빈 DB(신규 배포·CI)는
    # V1 부터 적용해 그대로 부팅된다. baseline-on-migrate 는 "이미 테이블이 있고 이력만 없는" 기존 DB 를 채택할 때만 의미.
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

# 운영 헬스 체크 — CD 배포 후 검증과 컨테이너 healthcheck 전용.
# health + prometheus 만 노출한다(나머지 actuator 정보는 차단). health 상세는 숨긴다(상태 UP/DOWN 만 응답).
# 기본 health 는 DB·Redis 연결까지 확인하므로 앱+의존성이 모두 살아야 UP 이 된다(readiness 성격).
# prometheus 는 /actuator/prometheus 로 메트릭을 노출 — edge nginx 가 /actuator 를 프록시하지 않으므로
# 내부망(default 망)의 Prometheus 컨테이너만 도달한다(외부 비노출).
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  # 모든 메트릭에 application 라벨을 붙인다 — Grafana 에서 서비스 단위로 필터/집계할 때 쓴다.
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # http.server.requests 에 히스토그램 버킷을 실어 보내 Grafana 에서 p95/p99 를
      # histogram_quantile() 로 계산할 수 있게 한다(백엔드 지연 SLO 판정의 핵심).
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s


# 비로그인 팁 게시판의 추천/신고 1인 1회 제약에 쓰는 솔트.
# 클라이언트 IP 를 이 값으로 HMAC 해서 저장한다(원본 IP 는 남기지 않는다).
# 운영 compose 가 TIP_ACTOR_SALT 를 필수로 주입한다. 비어 있으면 기동 시 임시 솔트를 만든다(개발용).
tip:
  actor-salt: ${TIP_ACTOR_SALT:}

riot:
  api:
    key: ${RIOT_API_KEY}
    base-url: https://kr.api.riotgames.com
    asia-base-url: https://asia.api.riotgames.com

    account-by-riot-id-path: /riot/account/v1/accounts/by-riot-id/{gameName}/{tagLine}
    account-by-puuid-path: /riot/account/v1/accounts/by-puuid/{puuid}
    summoner-by-puuid-path: /lol/summoner/v4/summoners/by-puuid/{puuid}

    match-ids-by-puuid-path: /lol/match/v5/matches/by-puuid/{puuid}/ids
    match-by-id-path: /lol/match/v5/matches/{matchId}
    # 타임라인(분당 프레임 + 이벤트) — 아이템 구매 순서/스킬 선마 순서 추출용. 매치당 추가 1회 호출.
    match-timeline-by-id-path: /lol/match/v5/matches/{matchId}/timeline

    league-entries-by-puuid-path: /lol/league/v4/entries/by-puuid/{puuid}
    league-apex-by-queue-path: /lol/league/v4/{apexTier}/by-queue/{queue}

    champion-mastery-by-puuid-path: /lol/champion-mastery/v4/champion-masteries/by-puuid/{puuid}

    # 인게임(실시간) 정보 — 게임 중이 아니면 Riot이 404를 반환한다.
    active-game-by-puuid-path: /lol/spectator/v5/active-games/by-summoner/{puuid}

    # 개발용 키 한도(20 req/s, 100 req/2분)보다 살짝 낮게 잡아 429 여유 확보. 모든 Riot 호출이 공유.
    rate-limit:
      requests-per-second: 18
      requests-per-two-minutes: 95

  # 매치망 점진 수집 크롤러(검색된 유저의 동료 puuid를 백그라운드로 따라가며 매치 누적)
  crawler:
    # Personal 키(95콜/2분 공유) 한계로 백그라운드 크롤이 실시간 검색·갱신 예산을 잠식해 비활성화.
    # 매치망 확장 대신 유저별 수동 갱신만 사용한다. Production 키 확보 시 true 로 되살릴 수 있다.
    enabled: false
    interval-ms: 20000        # 스케줄러 처리 간격(이전 처리 종료 후 대기). 실제 속도는 레이트리밋이 결정
    max-depth: 1              # 검색 유저(0)로부터 몇 단계까지 확장할지. 1 = 직접 만난 동료까지만
    daily-limit: 300          # 하루 최대 처리 puuid 수(폭주 방지)
    matches-per-puuid: 10     # 크롤링 puuid 1명당 수집할 최근 매치 수

  # 전적 갱신 작업 큐(비동기). 요청을 큐에 넣고 즉시 jobId 응답 → 전용 워커가 BRPOP 으로 소비.
  refresh:
    worker-enabled: true
    lock-ttl-seconds: 120        # 중복 갱신 차단 + 직후 쿨다운. 워커가 죽어도 이 TTL로 락 자동 해제
    job-ttl-seconds: 600         # 잡 상태(status/total/done) 보존 시간(폴링 종료 후 자연 소멸)
    block-timeout-seconds: 5     # BRPOP 블록 최대 대기(초). 이 주기로 종료 플래그를 확인
    collect-concurrency: 5       # 신규 매치 동시 수집 개수. DB 커넥션 풀·Riot 공유 예산 고려해 작게 유지

  # 상위 티어 사다리 랭킹 주기 갱신(실시간 아님 — 30~60분마다 스냅샷)
  ranking:
    enabled: true
    refresh-interval-ms: 3600000   # 갱신 주기(기본 1시간)
    initial-delay-ms: 60000        # 기동 후 첫 갱신까지 지연(다른 초기화와 겹치지 않게)
    top-n: 300                     # 사다리 상위 몇 명까지 적재할지(이름 해소 호출량을 이 수로 제한)
    most-champion-count: 7         # 행마다 보여줄 모스트 챔피언 수(우리 DB 기준)
