# ── HTTPS(3단계) override ──
# prod 위에 얹어 edge nginx 를 TLS 종단으로 바꾸고 certbot 자동갱신 컨테이너를 추가한다.
# 최초 인증서 발급을 한 번 끝낸 뒤부터 상시 사용한다 — 순서는 docs/https-setup.md 참고.
#
#   기동: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.certbot.yml up -d
#   종료: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.certbot.yml down
services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # prod 의 default.conf 마운트를 HTTPS 버전으로 덮어쓴다(같은 컨테이너 경로라 override 가 이김).
      - ./nginx/default.https.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    # 6시간마다 nginx reload → certbot 이 갱신한 새 인증서를 무중단으로 반영한다.
    command: /bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'

  certbot:
    image: certbot/certbot
    container_name: lol-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # 12시간마다 갱신 시도(만료 30일 이내에만 실제 갱신). webroot 방식이라 nginx 를 멈추지 않는다.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    restart: unless-stopped

volumes:
  certbot-etc:
  certbot-webroot:
