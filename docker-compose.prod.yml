# 배포용 override — 앱 컨테이너(backend/frontend/nginx)를 base 인프라 위에 얹는다.
# mysql/redis 는 내부 네트워크로만 접근하므로 호스트 포트를 열지 않는다(외부 노출 최소화).
#
#   기동: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#   종료: docker compose -f docker-compose.yml -f docker-compose.prod.yml down
services:
  backend:
    build: ./backend
    container_name: lol-backend
    env_file:
      - ./.env                # RIOT_API_KEY, DB_PASSWORD (루트 .env 하나로 mysql 과 공유)
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      JAVA_OPTS: "-Xmx512m"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 768m
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lol-frontend
    mem_limit: 64m
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: lol-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    mem_limit: 64m
    restart: unless-stopped
