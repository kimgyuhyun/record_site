# 배포용 override — 앱 컨테이너(backend/frontend/nginx)를 base 인프라 위에 얹는다.
# mysql/redis 는 내부 네트워크로만 접근하므로 호스트 포트를 열지 않는다(외부 노출 최소화).
#
#   기동: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#   종료: docker compose -f docker-compose.yml -f docker-compose.prod.yml down
services:
  # 운영에서만 Redis 인증을 건다(dev 는 base 의 무인증 command 를 그대로 쓴다 — localhost 전용).
  # :? 로 필수화한 이유: 빈 문자열이면 --requirepass 가 무인증으로 조용히 폴백한다.
  redis:
    command: >-
      redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""

  backend:
    build: ./backend
    container_name: lol-backend
    env_file:
      - ./.env                # RIOT_API_KEY, DB_PASSWORD (루트 .env 하나로 mysql 과 공유)
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      SPRING_CACHE_TYPE: redis
      # 최소권한: 런타임은 DML 전용 계정, 스키마 변경(Flyway)만 DDL 가능 계정을 쓴다.
      # root 는 앱이 더 이상 쓰지 않는다(mysql healthcheck 와 deploy.sh 의 mysqldump 만 계속 root).
      DB_APP_USER: loldb_app
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:?DB_APP_PASSWORD required}
      DB_MIGRATE_USER: loldb_migrate
      DB_MIGRATE_PASSWORD: ${DB_MIGRATE_PASSWORD:?DB_MIGRATE_PASSWORD required}
      JAVA_OPTS: "-Xmx512m"
    # 세 망 모두 필요: default(nginx 가 프록시) + data(mysql/redis) + egress(Riot API 아웃바운드).
    networks:
      - default
      - data
      - egress
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 768m
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lol-frontend
    # 정적 SPA 서빙뿐 — 웹 계층만. DB 도 인터넷도 필요 없다.
    networks:
      - default
    mem_limit: 64m
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: lol-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    # egress 는 인터넷 용도가 아니라 필수 제약 때문이다: internal 망만 붙은 컨테이너는
    # 호스트 포트를 publish 할 수 없다 → 80/443 을 열려면 비-internal 망에 반드시 연결돼 있어야 한다.
    networks:
      - default
      - egress
    depends_on:
      - backend
      - frontend
    mem_limit: 64m
    restart: unless-stopped
