# 전체 스택: mysql + redis + backend + frontend + edge nginx
#  - 시크릿(RIOT_API_KEY, DB_PASSWORD)은 backend/.env 에서 주입한다(이미지에 굽지 않음).
#  - DB 비밀번호는 backend/.env 의 DB_PASSWORD 와 mysql 의 MYSQL_ROOT_PASSWORD 가 같아야 한다(기본 1234).
#  - mem_limit 은 Oracle Free(예: 12GB)에서 컨테이너별 메모리 상한을 둬 폭주를 막는다.
services:
  mysql:
    image: mysql:8.0
    container_name: lol-mysql
    ports:
      - "3307:3306"            # 호스트에서 직접 접속(개발 툴)할 수 있게 유지
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: loldb
    command: --innodb-buffer-pool-size=256M
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lol-redis
    # 캐시 전용이므로 메모리 상한 + LRU 축출. 영속화 불필요(꺼지면 캐시만 비워짐).
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    mem_limit: 320m
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: lol-backend
    env_file:
      - ./backend/.env        # RIOT_API_KEY, DB_PASSWORD
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      JAVA_OPTS: "-Xmx512m"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 768m
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lol-frontend
    mem_limit: 64m
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: lol-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    mem_limit: 64m
    restart: unless-stopped

volumes:
  mysql-data:
