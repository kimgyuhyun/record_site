# 공통(base) — 모든 환경이 공유하는 인프라(mysql + redis) 정의.
# 단독으로 쓰지 않고 dev/prod override 와 함께 사용한다.
#   개발: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   배포: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# (DB_PASSWORD = MySQL root 비밀번호. 기본값 폴백을 없앴으므로 루트 .env 에 반드시 정의해야 한다.
#  약한 기본값 1234 로 조용히 기동되던 사고를 막기 위한 것 — dev 도 .env 파일이 필요하다.)
services:
  mysql:
    image: mysql:8.0
    container_name: lol-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      MYSQL_DATABASE: loldb
    command: --innodb-buffer-pool-size=256M
    # data 망에만 둔다 — 웹 계층(nginx/frontend)에서 직접 도달 불가, 인터넷 egress 도 불가.
    networks:
      - data
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:?DB_PASSWORD required}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lol-redis
    # 캐시 전용: 메모리 상한 + LRU 축출, 영속화 끔(꺼지면 캐시만 비워짐).
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    networks:
      - data
    mem_limit: 320m
    restart: unless-stopped

# ── 네트워크 2계층 분리 ──
#   default : 웹 계층(nginx ↔ frontend ↔ backend)
#   data    : 데이터 계층(backend ↔ mysql/redis) — 웹 계층에서 도달 불가
#   egress  : 인터넷 아웃바운드가 필요한 서비스 전용(backend=Riot API, certbot=ACME, nginx=포트 publish)
# default/data 의 internal 잠금은 docker-compose.netlock.yml 에서 한다(dev 는 잠그지 않아 호스트 포트 공개 유지).
networks:
  default:
  data:
  egress:

volumes:
  mysql-data:
