# 공통(base) — 모든 환경이 공유하는 인프라(mysql + redis) 정의.
# 단독으로 쓰지 않고 dev/prod override 와 함께 사용한다.
#   개발: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   배포: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# (DB 비밀번호: 루트 .env 의 DB_PASSWORD 하나로 mysql·backend 가 공유한다 — 기본 1234)
services:
  mysql:
    image: mysql:8.0
    container_name: lol-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-1234}
      MYSQL_DATABASE: loldb
    command: --innodb-buffer-pool-size=256M
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lol-redis
    # 캐시 전용: 메모리 상한 + LRU 축출, 영속화 끔(꺼지면 캐시만 비워짐).
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    mem_limit: 320m
    restart: unless-stopped

volumes:
  mysql-data:
