# 배포용 override — 서버가 직접 빌드하지 않고 GHCR 이미지를 사용한다.
# prod.yml 의 backend/frontend 에 있는 build: 는 남아있지만, 아래 image: 로 대체하고
# 반드시 `up -d --no-build` 로 기동해 서버에서 재빌드가 일어나지 않게 한다.
#
# CD 흐름: commit-sha 태그로 pull → RepoDigest 로 고정(BACKEND_IMAGE/FRONTEND_IMAGE 를 digest 로 재설정) → up.
#   BACKEND_IMAGE=ghcr.io/kimgyuhyun/record_site-backend@sha256:...
#   FRONTEND_IMAGE=ghcr.io/kimgyuhyun/record_site-frontend@sha256:...
#
# 사용: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ghcr.yml [-f certbot] up -d --no-build
services:
  backend:
    # :? — 값이 비어있으면 즉시 에러(빈 태그로 잘못 배포되는 사고 방지)
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE (ghcr sha or digest) required}

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE (ghcr sha or digest) required}
