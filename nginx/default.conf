# edge(앞단) nginx — 외부 진입점(80포트).
#  - /api/  → backend 컨테이너로 리버스 프록시
#  - 그 외   → frontend 컨테이너(정적 SPA, /cdn·/static 포함)
#
# 이 파일은 TLS 이전 단계(docs/https-setup.md 의 2단계)용이다. 운영본은 default.https.conf 다.
# 여기에는 이상 Host 를 444 로 드롭하는 default_server 를 두지 않는다 —
# 이 단계는 도메인이 아직 없어 공인 IP 로 직접 접속해 확인하는 절차이고,
# server_name _ 로 그 접속을 받아주는 것이 이 파일의 목적이기 때문이다.
# 이상 Host 드롭은 도메인이 붙는 https 단계(default.https.conf)에서 적용한다.

# 레이트리밋 존(2단) — 상세 근거는 default.https.conf 참고.
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m     rate=8r/s;
limit_req_status 429;

upstream backend_upstream {
    server backend:8080;
}
upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # 업로드/요청 본문 상한(전적 갱신 등 단순 JSON이라 넉넉히 10m)
    client_max_body_size 10m;

    # 보안 헤더. HSTS 는 넣지 않는다 — 이 단계는 평문 HTTP 이고,
    # 평문 응답의 HSTS 는 브라우저가 무시한다(https 블록에만 두는 것이 맞다).
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # API: 백엔드로 프록시
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Riot 호출이 끼면 응답이 느릴 수 있어 타임아웃을 넉넉히
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # 그 외 모든 경로: 프론트엔드(정적 SPA)로 프록시
    location / {
        limit_req zone=general burst=60 nodelay;

        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
