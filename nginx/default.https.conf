# edge(앞단) nginx — HTTPS 종단 버전(3단계). 최초 인증서 발급 후 사용한다(docs/https-setup.md 참고).
#  - 80  : Let's Encrypt 갱신 챌린지만 평문 응답 + 그 외는 443으로 301 리다이렉트
#  - 443 : 실제 서비스 종단(/api → backend, 그 외 → frontend)
# 도메인: kdagg.kozow.com (server_name 2곳 + 인증서 경로 2곳에 반영됨)

# ── 레이트리밋 존(2단) ──
# 키는 클라이언트 IP. 이 nginx 가 엣지라서 $binary_remote_addr 가 실제 사용자 IP 다.
#  general : 정적/페이지. 실측 근거 — /champions 페이지 한 번 로딩이 2.3초에 172요청
#            (챔피언 아이콘 169개를 이 nginx 가 /cdn/ 로 직접 서빙한다. 외부 CDN 이 아니다).
#            30r/s·burst 60 으로는 이 한 번의 로딩에서 이미지 33개가 429 로 깨졌다.
#            정적 파일은 서빙 비용이 낮아 조이는 실익도 작다 — 한 페이지 로딩이 통째로
#            버스트에 들어가도록 잡고, 남용 방지는 유지한다.
#  api     : /api/ 전용 엄격존. 전적 갱신 POST 처럼 Riot 호출을 유발하는 경로가 여기 걸린다
#            (Riot 개발용 키는 20 req/s · 100 req/2분이라 남용되면 서비스 전체가 429 를 맞는다).
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api:10m     rate=8r/s;
# 기본값 503(서버 잘못)보다 429(클라이언트가 과했음)가 의미상 맞다.
limit_req_status 429;

upstream backend_upstream {
    server backend:8080;
}
upstream frontend_upstream {
    server frontend:80;
}

# ── 80/443 default_server: 이상 요청 드롭 ──
# server_name 이 우리 도메인과 맞지 않는 요청(IP 직접 접근, 스캐너의 임의 Host 헤더)은
# 여기로 떨어진다. 444 는 응답을 만들지 않고 연결을 끊는 nginx 전용 코드다.
# 아래 kdagg.kozow.com 블록들은 default_server 가 아니므로 영향 없이 정상 응답한다.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    server_name _;

    # TLS 종단이 성립해야 Host 를 보고 드롭할 수 있어, 서비스와 같은 인증서를 재사용한다.
    # (이 블록에 도달한 시점에 이미 우리 도메인 요청이 아니므로 인증서 불일치는 문제되지 않는다.)
    ssl_certificate     /etc/letsencrypt/live/kdagg.kozow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kdagg.kozow.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 444;
}

# ── HTTP(80): 갱신 챌린지 응답 + 나머지는 HTTPS 리다이렉트 ──
server {
    listen 80;
    server_name kdagg.kozow.com;

    # certbot(webroot) 갱신 챌린지 — 이 경로만 평문 HTTP로 응답한다.
    # Let's Encrypt 는 도메인으로 접속하므로 이 블록에 들어온다(위 default_server 로 안 빠진다).
    # 레이트리밋을 걸지 않는다 — 갱신을 막는 사고를 만들지 않기 위해서.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 요청은 HTTPS로 영구 리다이렉트.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS(443): 실제 종단 ──
server {
    listen 443 ssl;
    server_name kdagg.kozow.com;

    ssl_certificate     /etc/letsencrypt/live/kdagg.kozow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kdagg.kozow.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 업로드/요청 본문 상한(전적 갱신 등 단순 JSON이라 넉넉히 10m)
    client_max_body_size 10m;

    # ── 보안 헤더 ──
    # always: 4xx/5xx 응답에도 붙인다(기본은 2xx/3xx 계열에만 붙음).
    # HSTS 는 https 블록에만 둔다 — 평문 80 응답에 붙이면 무시되거나 오해를 준다.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY" always;              # 클릭재킹(iframe 삽입) 차단
    add_header X-Content-Type-Options    "nosniff" always;           # MIME 스니핑 차단
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # CSP 는 이번에 도입하지 않는다(별도 검토 대상).
    # 측정해보니 챔피언 아이콘까지 전부 same-origin(/cdn/)이라 처음 걱정한 만큼
    # 외부 출처가 많지는 않다. 다만 inline script/style 사용 여부를 프론트 번들에서
    # 확인해야 하고, 잘못 걸면 화면이 통째로 깨져서 별도 작업으로 뺀다.

    # API: 백엔드로 프록시
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Riot 호출이 끼면 응답이 느릴 수 있어 타임아웃을 넉넉히
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # 그 외 모든 경로: 프론트엔드(정적 SPA)로 프록시
    location / {
        limit_req zone=general burst=200 nodelay;

        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
