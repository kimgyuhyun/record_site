# frontend 컨테이너 전용 nginx — SPA 정적 파일만 서빙한다.
# (/api 리버스 프록시는 앞단 edge nginx 가 처리하므로 여기엔 없다)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 해시 파일명이 박힌 빌드 자산은 길게 캐싱
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # DDragon 정적 자산(이미지) — 패치 버전 폴더라 길게 캐싱
    location /cdn/ {
        expires 30d;
        add_header Cache-Control "public";
    }
    location /static/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # React Router 클라이언트 라우팅: 없는 경로는 index.html 로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }
}
