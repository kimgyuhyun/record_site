# Loki 단일 바이너리 + 파일시스템 저장(포트폴리오/단일 호스트 규모). 인증 없음 — monitoring 망 내부 전용.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # 구조화 로그의 필드를 인덱스 라벨로 승격하지 않고 메타데이터로 붙일 수 있게 한다(라벨 폭증 방지).
  allow_structured_metadata: true
  retention_period: 72h    # 슬림: 3일 보관(디스크 절약). 필요하면 늘린다.
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 8

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
